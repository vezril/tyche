schema: spec-driven

context: |
  Tyche — a self-hosted, single-user YNAB-style budgeting app (envelope/zero-based, CAD-only,
  cash accounts only) with RBC bank sync via Plaid (Trial plan, 6h polling, no
  webhooks) and OFX/CSV import fallback.
  Stack (ADR-002): TypeScript end-to-end — Node 22 + Fastify + better-sqlite3
  (WAL) backend, React + Vite SPA frontend, REST + cookie sessions, single
  Docker container via docker-compose.
  Money is integer milliunits (ADR-004); budget aggregates recomputed on read,
  never stored (ADR-005); Plaid access tokens AES-256-GCM encrypted at rest,
  master key in .env (ADR-007).
  Governing artifacts: docs/prd.md (FR-N/NFR-N IDs — trace work to them),
  docs/architecture.md, docs/adr/, docs/stories/.

